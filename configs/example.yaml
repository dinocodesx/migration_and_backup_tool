# configs/example.yaml

operation: migrate # migrate | backup | restore | verify

source:
  type: postgres
  host: localhost
  port: 5432
  database: appdb
  user: user
  password: "password"
  tables:
    - users

target:
  type: mysql
  host: localhost
  port: 3306
  database: targetdb
  user: user
  password: "password"

concurrency:
  num_readers: 16
  num_transformers: 8
  num_writers: 16
  batch_size: 1000
  batch_timeout: 5s

migration:
  conflict_strategy: upsert
  verify_after: true
  verify_sample_pct: 1.0

backup:
  format: parquet
  compression: zstd
  chunk_size_mb: 512
  storage:
    type: local
    prefix: backups/
  retention:
    keep_last: 7

checkpoint:
  path: checkpoints/
  flush_every_n_batches: 10

telemetry:
  log_level: info
  log_format: console
  metrics_addr: ":9090"
