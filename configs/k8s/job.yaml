# Kubernetes Job manifest for a one-shot gomigrate migration.
#
# Usage:
#   kubectl apply -f job.yaml
#
# The Job runs gomigrate with the 'migrate' command, using a ConfigMap for the
# config file and a Secret for database credentials.
#
# Prerequisites:
#   1. Create a ConfigMap from your config file:
#      kubectl create configmap gomigrate-config --from-file=config.yaml=configs/example.yaml
#   2. Create a Secret with your database passwords:
#      kubectl create secret generic gomigrate-secrets \
#        --from-literal=PG_SOURCE_PASSWORD='...' \
#        --from-literal=PG_TARGET_PASSWORD='...'

apiVersion: batch/v1
kind: Job
metadata:
  name: gomigrate-migrate
  namespace: default
  labels:
    app.kubernetes.io/name: gomigrate
    app.kubernetes.io/component: migrate
spec:
  # Automatically retry on pod failure, up to 3 times.
  backoffLimit: 3
  # Remove the Job (and its pods) 24 hours after completion.
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gomigrate
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      # Use an init container to copy the config from the ConfigMap to a writable volume.
      initContainers: []
      containers:
        - name: gomigrate
          image: ghcr.io/dinocodesx/gomigrate:latest
          imagePullPolicy: IfNotPresent
          command: ["gomigrate", "migrate"]
          args:
            - "--config=/etc/gomigrate/config.yaml"
          env:
            # Credential injection from Kubernetes Secrets.
            - name: GOMIGRATE_SOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gomigrate-secrets
                  key: PG_SOURCE_PASSWORD
            - name: GOMIGRATE_TARGET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gomigrate-secrets
                  key: PG_TARGET_PASSWORD
            # Telemetry — point to your collector if available.
            - name: GOMIGRATE_TELEMETRY_TRACING_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4318"
            - name: GOMIGRATE_TELEMETRY_METRICS_ADDR
              value: ":9090"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/gomigrate
              readOnly: true
            - name: checkpoint
              mountPath: /var/lib/gomigrate
      volumes:
        - name: config
          configMap:
            name: gomigrate-config
        # Ephemeral checkpoint storage — for persistent resume across pod restarts,
        # replace with a PersistentVolumeClaim.
        - name: checkpoint
          emptyDir: {}
