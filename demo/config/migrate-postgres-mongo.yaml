source:
  type: postgres
  host: localhost
  port: 5432
  database: testdb
  user: user
  password: password
  tables:
    - demo_users

target:
  type: mongo
  host: localhost
  port: 27017
  database: testdb

concurrency:
  num_readers: 8
  num_writers: 8
  batch_size: 200
  batch_timeout: 1s

checkpoint:
  path: demo/checkpoint_mongo.bolt

telemetry:
  log_level: info
